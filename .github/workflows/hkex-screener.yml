name: Daily HKEX Screener

# ----------------------------------------------------------------------
# HKEX closes 16:00 HKT (UTC+8). Cron is UTC:
#   08:15 UTC Mon-Fri = 16:15 HKT  -> daily scan after HKEX close
#   01:30 UTC Sat     = 09:30 HKT  -> weekly signal performance review
# Uses ITS OWN Telegram bot via the *_HK secrets.
# ----------------------------------------------------------------------
on:
  schedule:
    - cron: "15 8 * * 1-5"     # daily scan
    - cron: "30 1 * * 6"       # Saturday weekly review
  workflow_dispatch:
    inputs:
      mode:
        description: "scan or review"
        required: false
        default: "scan"

permissions:
  contents: write

concurrency:
  group: hkex-screener
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Decide mode (scan or review)
        id: mode
        run: |
          MODE="scan"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "30 1 * * 6" ]; then
            MODE="review"
          fi
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            MODE="${{ github.event.inputs.mode }}"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Running in mode: $MODE"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run screener (HKEX top 500 by market cap)
        if: steps.mode.outputs.mode == 'scan'
        env:
          MARKET: HKEX
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_HK }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Run weekly review
        if: steps.mode.outputs.mode == 'review'
        env:
          MARKET: HKEX
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_HK }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python review.py

      - name: Commit signal log back to repo
        if: steps.mode.outputs.mode == 'scan'
        run: |
          git config user.name "hkex-screener-bot"
          git config user.email "actions@github.com"
          if [ -f signals_hkex.csv ]; then
            git add signals_hkex.csv
            if ! git diff --cached --quiet; then
              git commit -m "HKEX signal log: $(date -u +'%Y-%m-%d %H:%M') UTC"
              git pull --rebase origin ${{ github.ref_name }} || true
              git push
            else
              echo "No new signals to commit."
            fi
          fi
